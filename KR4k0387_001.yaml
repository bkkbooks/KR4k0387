body:
  text: 喻歸西河記姑臧匈奴故蓋臧城也城不方有頭尾雨翅名蓋鳥城初學記涼州辠人於市將刑忽有一白雄雞飛於人邊請命引頸長鳴伏地向吏驅之去輒來刺史張義色其坐藝文類聚太平御覽張駿立謙光殿成後池水中有五龍晝日見移時乃滅水通變綠色駿因作鑄銅龍以厭之後卒不勝此殿太平御覽西河無蠶桑婦女著碧纈裙加細布裳著纈襦襖以外國五色錦為袴褶北堂書鈔太平御覽貸我東墻償我白梁漢書注史記索隱齊民要術趙倫妻死遺雪竹搔頭階下不數日化為楊梅𠌶朵如撒時人異之太平御覽引姑臧記錢芸士好讀離騷手不暇揭忘去肉味半月如齋太平御覽引姑臧記
